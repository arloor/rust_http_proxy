name: Combined Build and Release
on:
  push:
    branches: ["release","release/*"]
  pull_request:
    branches: ["master"]
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [non-bpf, bpf-dyn-link, bpf-static-link]
        include:
          - build-type: non-bpf
            build_args:
            extra_deps:
            binary-name: rust_http_proxy
            docker-tag: latest
            use_zigbuild: true
            zig_glibc_version: "2.17"
            after_install: ""
          - build-type: bpf-dyn-link
            build_args: --features bpf
            extra_deps:  zlib1g-dev libelf-dev clang pkg-config make
            binary-name: rust_http_proxy_bpf
            docker-tag: bpf
            use_zigbuild: true
            zig_glibc_version: "2.17"
            after_install: |
              # cargo-zigbuild intentionally hides /usr/include so that Zig's
              # glibc 2.17 headers cannot be shadowed by the build host's glibc.
              # Copy only the third-party headers needed to build libbpf.
              libbpf_zig_include=/tmp/libbpf-zig-include
              install -d "$libbpf_zig_include"
              install -m 0644 \
                /usr/include/libelf.h \
                /usr/include/gelf.h \
                /usr/include/zlib.h \
                /usr/include/zconf.h \
                "$libbpf_zig_include/"
              export LIBBPF_SYS_EXTRA_CFLAGS="-isystem $libbpf_zig_include"
              export LIBBPF_SYS_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu
          - build-type: bpf-static-link
            # Build libelf and zlib with Zig too. The bpf_static feature would
            # reuse host-built static archives, which may require a newer glibc.
            build_args: --features bpf_vendored
            extra_deps:  clang pkg-config make autoconf autopoint flex bison gawk
            binary-name: rust_http_proxy_bpf_static
            docker-tag: bpf_static
            use_zigbuild: true
            zig_glibc_version: "2.17"
            after_install: ""
    steps:
      - uses: actions/checkout@v6
      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short=8 HEAD)" >> $GITHUB_OUTPUT

      # 构建二进制文件
      - name: Build ${{ matrix.build-type }} Version
        id: build
        uses: arloor/rust_musl_action@latest
        with:
          use_musl: false
          use_zigbuild: ${{ matrix.use_zigbuild }}
          zig_version: "0.15.2"
          zig_glibc_version: ${{ matrix.zig_glibc_version }}
          extra_deps: ${{ matrix.extra_deps }}
          after_install: ${{ matrix.after_install }}
          args: -p rust_http_proxy ${{ matrix.build_args }}
          # apt_mirror: mirrors.mit.edu
          debug: false

      # 复制并重命名二进制文件
      - name: Copy binary
        run: |
          mkdir -p ${{ github.workspace }}/release_binaries
          cp ${{ steps.build.outputs.release_dir }}/rust_http_proxy ${{ github.workspace }}/release_binaries/${{ matrix.binary-name }}
          ls -lh ${{ github.workspace }}/release_binaries/

      - name: Verify glibc 2.17 compatibility
        shell: bash
        run: |
          set -euo pipefail
          binary=${{ github.workspace }}/release_binaries/${{ matrix.binary-name }}
          max_glibc=$(
            readelf -W --version-info --dyn-syms "$binary" |
              grep -oE 'GLIBC_[0-9]+(\.[0-9]+)+' |
              sed 's/^GLIBC_//' |
              sort -Vu |
              tail -n 1
          )
          if [[ -z "$max_glibc" ]]; then
            echo "::error::No GLIBC symbol versions found in $binary"
            exit 1
          fi
          if [[ "$(printf '%s\n' 2.17 "$max_glibc" | sort -V | tail -n 1)" != "2.17" ]]; then
            echo "::error::$binary requires GLIBC_$max_glibc (expected at most GLIBC_2.17)"
            readelf -W --version-info --dyn-syms "$binary"
            exit 1
          fi
          echo "$binary requires at most GLIBC_$max_glibc"

          if [[ "${{ matrix.build-type }}" == "bpf-static-link" ]] &&
             readelf -d "$binary" | grep -Eq '\[(libelf|libz)\.so'; then
            echo "::error::Static BPF binary still has a dynamic libelf/libz dependency"
            readelf -d "$binary"
            exit 1
          fi

      # 上传构建好的二进制文件作为构建工件
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.binary-name }}
          path: ${{ github.workspace }}/release_binaries/${{ matrix.binary-name }}
          retention-days: 1

      # Docker镜像构建和推送（仅适用于release分支）
      - name: Set up Docker Buildx
        if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: arloor
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Login to Quay.io
        if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: arloor
          password: ${{ secrets.QUAY_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.dyn
          push: true
          tags: |
            docker.io/arloor/rust_http_proxy:${{ matrix.docker-tag }}
            quay.io/arloor/rust_http_proxy:${{ matrix.docker-tag }}
          cache-from: type=gha,scope=${{ matrix.build-type }}
          cache-to: type=gha,scope=${{ matrix.build-type }},mode=max

  # 创建GitHub Release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/release' || startsWith(github.ref, 'refs/heads/release/'))
    steps:
      - uses: actions/checkout@v6

      # 创建目录存放下载的二进制文件
      - name: Create directory for binaries
        run: mkdir -p release_binaries

      # 下载所有构建好的二进制文件
      - name: Download standard binary
        uses: actions/download-artifact@v8
        with:
          name: rust_http_proxy
          path: release_binaries

      - name: Download bpf dynamic binary
        uses: actions/download-artifact@v8
        with:
          name: rust_http_proxy_bpf
          path: release_binaries

      - name: Download bpf static binary
        uses: actions/download-artifact@v8
        with:
          name: rust_http_proxy_bpf_static
          path: release_binaries

      # 列出所有下载的文件
      - name: List binaries
        run: find release_binaries -type f -ls

      # 创建master分支release（包含三个二进制文件）
      - name: Create Master Release
        if: github.ref == 'refs/heads/release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=latest
          if $(gh release delete ${version} -y --cleanup-tag);
            then echo "delete old release";
            else echo "no old release";
          fi
          git config --local user.email "admin@arloor.com"
          git config --local user.name "arloor"
          gh release create ${version} release_binaries/* -n "最新构建包含三个版本：标准版、动态链接BPF版和静态链接BPF版" --latest -t "${version}"

      # 创建版本release（同样包含三个二进制文件）
      - name: Create Version Release
        if: startsWith(github.ref, 'refs/heads/release/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 从Cargo.toml中提取版本号
          version=$(grep -E ^version rust_http_proxy/Cargo.toml|awk -F "[\"]" '{print $2}')
          version="v${version}"
          if [ -z "$version" ]; then echo "version not found"; exit 1; fi
          if $(gh release delete ${version} -y --cleanup-tag);
            then echo "delete old release";
            else echo "no old release";
          fi
          git config --local user.email "admin@arloor.com"
          git config --local user.name "arloor"
          gh release create ${version} release_binaries/* -n "${version} 包含三个版本：标准版、动态链接BPF版和静态链接BPF版" -t "${version}"
